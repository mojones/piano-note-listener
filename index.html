<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <!-- 100% privacy-first analytics -->
  <script data-collect-dnt="true" async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg">
  <link rel="stylesheet" href="style.css">
  <title>Piano Note Listener</title>
</head>
<body>
  <main>
    <p class="eyebrow">LOW-LATENCY · ON-DEVICE</p>
    <h1>Piano note listener</h1>
    <section class="readout" aria-live="polite">
      <div id="note">—</div>
      <div id="confidence">Tap start and play C major</div>
    </section>
    <button id="start">Start microphone</button>
    <label>Silence threshold <output id="thresholdValue">0.014</output>
      <input id="threshold" type="range" min="0.003" max="0.050" value="0.014" step="0.001">
    </label>
    <div class="meta"><span id="latency">42.7 ms analysis</span><span id="status">Ready</span></div>
    <section>
      <h2>Detected notes</h2>
      <ol id="history" class="history"></ol>
    </section>
    <p class="hint">Recognizes C4, D4, E4, F4, G4, A4, B4 and C5. Use Chrome on Android over HTTPS.</p>
  </main>
  <script type="module" src="app.mjs"></script>
</body>
</html>
